<style>
  body { background: #fff; color: var(--ink); }

  /* ── STICKY TOOLBAR ── */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 99;
    background: #fff;
    border-bottom: 1px solid var(--hairline);
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  #toolbar .search-wrap {
    flex: 1;
    min-width: 180px;
    max-width: 360px;
    position: relative;
  }
  #toolbar .search-wrap svg {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    padding: 9px 12px 9px 35px;
    border: 1px solid var(--hairline-2);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--sans);
    color: var(--ink);
    background: #fff;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #search-input:focus {
    border-color: var(--bronze);
    box-shadow: 0 0 0 3px var(--bronze-wash);
  }
  #trade-filter {
    padding: 9px 36px 9px 12px;
    border: 1px solid var(--hairline-2);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--sans);
    color: var(--ink);
    background: #fff;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%237A6F60' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    cursor: pointer;
    transition: border-color .2s;
    min-width: 200px;
  }
  #trade-filter:focus { border-color: var(--bronze); }
  #clear-btn {
    padding: 9px 16px;
    border: 1px solid var(--hairline-2);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 500;
    color: var(--muted);
    background: #fff;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  #clear-btn:hover { border-color: var(--bronze); color: var(--ink); }
  #count-badge {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.03em;
    margin-left: auto;
    white-space: nowrap;
    font-family: var(--sans);
  }
  #count-badge strong { color: var(--ink); }

  /* ── PAGE HERO ── */
  .page-hero {
    background: #fff;
    border-bottom: 3px solid var(--bronze);
    padding: 40px 24px 32px;
    text-align: center;
  }
  .page-hero .eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--bronze);
    font-weight: 600;
    margin-bottom: 10px;
    font-family: var(--sans);
  }
  .page-hero h1 {
    font-family: var(--serif);
    font-size: clamp(24px, 4vw, 38px);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .page-hero .subtitle {
    font-size: 14px;
    color: var(--muted);
  }

  /* ── DIRECTORY ── */
  .directory { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── TRADE SECTION ── */
  .trade-section { margin-bottom: 40px; }
  .trade-section[data-hidden="true"] { display: none; }

  .trade-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .trade-heading::before {
    content: '';
    display: block;
    width: 4px;
    height: 22px;
    background: var(--bronze);
    border-radius: 2px;
    flex-shrink: 0;
  }
  .trade-heading h2 {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--bronze);
    margin: 0;
  }
  .trade-heading .trade-count {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--sans);
  }

  /* ── VENDOR CARD GRID ── */
  .vendor-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  /* ── INDIVIDUAL VENDOR CARD ── */
  .vendor-card {
    background: #fff;
    border: 1px solid var(--hairline);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color .2s, box-shadow .15s;
  }
  .vendor-card:nth-child(even) { background: var(--surface); }
  .vendor-card[data-hidden="true"] { display: none; }
  .vendor-card:hover {
    border-color: var(--bronze-border);
    box-shadow: 0 4px 14px -4px rgba(28,24,20,.10);
  }

  .vc-company {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.3;
  }
  .vc-contact {
    font-size: 12px;
    color: var(--ink-soft);
    font-family: var(--sans);
  }
  .vc-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  .vc-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    color: var(--bronze);
    text-decoration: none;
    font-family: var(--sans);
    transition: color .15s;
  }
  .vc-link:hover { color: var(--bronze-deep); text-decoration: underline; }
  .vc-link svg { flex-shrink: 0; }
  .vc-sep { color: var(--hairline-2); font-size: 11px; }

  /* ── CALL BUTTON (mobile) ── */
  .vc-footer {
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .vc-call-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--bronze-wash);
    border: 1px solid var(--bronze-border);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--bronze);
    text-decoration: none;
    font-family: var(--sans);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .vc-call-btn:hover { background: var(--bronze); color: #fff; border-color: var(--bronze); }
  .vc-call-btn.no-phone {
    opacity: 0.35;
    pointer-events: none;
    cursor: default;
  }

  /* ── NO RESULTS ── */
  #no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 15px;
  }
  #no-results strong { color: var(--ink); }

  /* ── PRINT ── */
  @media print {
    #toolbar { display: none !important; }
    .page-hero { padding: 20px; }
    .vendor-card { break-inside: avoid; border: 1px solid #ccc; }
    .vc-call-btn { display: none; }
    body { background: #fff !important; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #toolbar { padding: 10px 14px; gap: 8px; }
    #trade-filter { min-width: 150px; }
    #count-badge { display: none; }
    .vendor-grid { grid-template-columns: 1fr; }
    .directory { padding: 20px 14px 60px; }
  }
</style>
</head>

// ── FORMAT PHONE: dots → dashes ──
function fmtPhone(p) {
  return p ? p.replace(/\./g, '-') : '';
}

// ── COLLECT UNIQUE TRADES ──
const ALL_TRADES = [...new Set(CONTRACTORS.map(c => c.trade))].sort();
const TOTAL_VENDORS = CONTRACTORS.length;
const TOTAL_TRADES  = ALL_TRADES.length;

// ── POPULATE TRADE DROPDOWN ──
const sel = document.getElementById('trade-filter');
ALL_TRADES.forEach(t => {
  const opt = document.createElement('option');
  opt.value = t;
  opt.textContent = t;
  sel.appendChild(opt);
});

// ── GROUP BY TRADE ──
function groupByTrade(arr) {
  const map = {};
  arr.forEach(c => {
    if (!map[c.trade]) map[c.trade] = [];
    map[c.trade].push(c);
  });
  return map;
}

// ── BUILD CARD HTML ──
function buildCard(c) {
  const phoneFormatted = fmtPhone(c.phone);
  const links = [];
  if (c.phone) {
    links.push(`<a class="vc-link" href="tel:${c.phone.replace(/\./g,'-')}">${ICON_PHONE} ${phoneFormatted}</a>`);
  }
  if (c.email) {
    // some emails in data are missing "mailto:" — treat as address
    const emailAddr = c.email.includes('@') ? c.email : '';
    if (emailAddr) {
      links.push(`<a class="vc-link" href="mailto:${emailAddr}">${ICON_EMAIL} ${emailAddr}</a>`);
    }
  }
  if (c.website) {
    const url = c.website.startsWith('http') ? c.website : 'https://' + c.website;
    links.push(`<a class="vc-link" href="${url}" target="_blank" rel="noopener">${ICON_WEB} ${c.website}</a>`);
  }

  const callBtnClass = c.phone ? 'vc-call-btn' : 'vc-call-btn no-phone';
  const callHref     = c.phone ? `href="tel:${fmtPhone(c.phone)}"` : '';
  const callLabel    = c.phone ? `Call ${phoneFormatted}` : 'No phone listed';

  return `
    <div class="vendor-card" data-company="${(c.company||'').toLowerCase()}" data-contact="${(c.contact||'').toLowerCase()}" data-trade="${(c.trade||'').toLowerCase()}">
      <div class="vc-company">${c.company}</div>
      ${c.contact ? `<div class="vc-contact">${c.contact}</div>` : ''}
      ${links.length ? `<div class="vc-links">${links.join('<span class="vc-sep"> · </span>')}</div>` : ''}
      <div class="vc-footer">
        <a class="${callBtnClass}" ${callHref}>${ICON_CALL} ${callLabel}</a>
      </div>
    </div>`;
}

// ── INITIAL RENDER ──
function buildDirectory() {
  const dir = document.getElementById('directory');
  dir.innerHTML = '';
  const grouped = groupByTrade(CONTRACTORS);
  ALL_TRADES.forEach(trade => {
    const vendors = grouped[trade] || [];
    const section = document.createElement('div');
    section.className = 'trade-section';
    section.dataset.trade = trade;
    section.innerHTML = `
      <div class="trade-heading">
        <h2>${trade}</h2>
        <span class="trade-count">${vendors.length} vendor${vendors.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="vendor-grid">${vendors.map(buildCard).join('')}</div>`;
    dir.appendChild(section);
  });
  updateCount(TOTAL_VENDORS, TOTAL_TRADES);
}

// ── FILTER ──
function filterDirectory() {
  const q    = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const cat  = (document.getElementById('trade-filter').value || '').toLowerCase();

  let visVendors = 0;
  let visTrades  = 0;

  document.querySelectorAll('.trade-section').forEach(section => {
    const tradeName = (section.dataset.trade || '').toLowerCase();
    const tradeMatch = !cat || tradeName === cat;

    let visInSection = 0;
    section.querySelectorAll('.vendor-card').forEach(card => {
      const cMatch = !q || card.dataset.company.includes(q) || card.dataset.contact.includes(q) || card.dataset.trade.includes(q);
      const show = tradeMatch && cMatch;
      card.dataset.hidden = show ? 'false' : 'true';
      if (show) visInSection++;
    });

    const showSection = visInSection > 0;
    section.dataset.hidden = showSection ? 'false' : 'true';
    if (showSection) {
      visTrades++;
      visVendors += visInSection;
    }
  });

  updateCount(visVendors, visTrades);
  document.getElementById('no-results').style.display = visVendors === 0 ? 'block' : 'none';
}

function updateCount(vendors, trades) {
  document.getElementById('visible-count').textContent = vendors;
  document.getElementById('trade-count').textContent   = trades;
}

// ── CLEAR ──
function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('trade-filter').value = '';
  filterDirectory();
}

// ── BOOT ──
buildDirectory();
</script>
